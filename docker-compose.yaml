services:
  database:
    image: postgres:16-alpine
    container_name: letube-db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5467:5432'

  rabbitmq:
    image: rabbitmq:3
    container_name: letube-rabbitmq
    restart: always
    ports:
      - '5672:5672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  pg_data:
  rabbitmq_data:
